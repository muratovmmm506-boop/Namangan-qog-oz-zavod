<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish | Qog'oz Zavod</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #FF8200;
            --primary-dark: #e67500;
            --primary-light: #fff3e6;
            --secondary: #1a1a1a;
            --gray: #666;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative top accent */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), #ffa344);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo i {
            color: var(--primary);
        }

        .login-header p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary);
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            color: var(--secondary);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .btn-login {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 130, 0, 0.2);
        }

        /* Toggle between Login and Register sections */
        #register-section {
            display: none;
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--gray);
        }

        .toggle-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        /* Floating alert */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }
    </style>
</head>

<body>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: var(--success); font-size: 1.2rem;"></i>
        <span id="toastMsg">Amaliyot bajarildi</span>
    </div>

    <div class="login-container">
        <div class="login-header">
            <a href="index.html" class="logo">
                <i class="fas fa-industry"></i> QOG'OZ ZAVOD
            </a>
            <p id="form-subtitle">Tizimga kirish uchun ma'lumotlarni kiriting</p>
        </div>

        <!-- LOGIN FORM -->
        <form id="login-form">
            <div class="form-group">
                <label>Email manzil</label>
                <div class="input-group">
                    <i class="far fa-envelope"></i>
                    <input type="email" id="login-email" class="form-control" placeholder="admin@qogoz.uz" required>
                </div>
            </div>

            <div class="form-group">
                <label>Parol</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" class="form-control" placeholder="Parolingizni kiriting"
                        required>
                </div>
                <div id="login-error" class="error-msg">Email yoki parol noto'g'ri</div>
            </div>

            <button type="submit" class="btn-login">Tizimga kirish</button>

            <div class="toggle-link">
                Akkauntingiz yo'qmi? <a href="#" id="show-register">Ro'yxatdan o'tish</a>
            </div>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" style="display: none;">
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Ismingiz</label>
                    <div class="input-group">
                        <i class="far fa-user"></i>
                        <input type="text" id="reg-firstname" class="form-control" placeholder="Ism" required>
                    </div>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Familiyangiz</label>
                    <div class="input-group">
                        <i class="far fa-user"></i>
                        <input type="text" id="reg-lastname" class="form-control" placeholder="Familiya" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email manzil</label>
                <div class="input-group">
                    <i class="far fa-envelope"></i>
                    <input type="email" id="reg-email" class="form-control" placeholder="admin@qogoz.uz" required>
                </div>
                <div id="reg-email-error" class="error-msg">Bu email allaqachon ro'yxatdan o'tgan</div>
            </div>

            <div class="form-group">
                <label>Parol yarating</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 ta belgi" required
                        minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-login">Ro'yxatdan o'tish va Kirish</button>

            <div class="toggle-link">
                Allaqachon akkauntingiz bormi? <a href="#" id="show-login">Tizimga kirish</a>
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegisterBtn = document.getElementById('show-register');
        const showLoginBtn = document.getElementById('show-login');
        const formSubtitle = document.getElementById('form-subtitle');
        const toast = document.getElementById('toast');

        // Toggle logic
        showRegisterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            formSubtitle.textContent = 'Admin panelga kirish uchun dastlab ro\'yxatdan o\'ting';
        });

        showLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            formSubtitle.textContent = 'Tizimga kirish uchun ma\'lumotlarni kiriting';
        });

        // Show Toast Function
        function showToast(message, isError = false) {
            toast.className = `toast show ${isError ? 'error' : 'success'}`;
            toast.innerHTML = `
                <i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}" style="color: var(--${isError ? 'danger' : 'success'}); font-size: 1.2rem;"></i>
                <span>${message}</span>
            `;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Register Logic
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const fName = document.getElementById('reg-firstname').value;
            const lName = document.getElementById('reg-lastname').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;

            // Get existing users from localStorage
            let users = JSON.parse(localStorage.getItem('qogozAdmins') || '[]');

            // Check if email exists
            if (users.find(u => u.email === email)) {
                document.getElementById('reg-email-error').style.display = 'block';
                return;
            }
            document.getElementById('reg-email-error').style.display = 'none';

            // Create new admin
            const newAdmin = {
                firstName: fName,
                lastName: lName,
                email: email,
                password: pass // In a real app, this should be hashed
            };

            users.push(newAdmin);
            localStorage.setItem('qogozAdmins', JSON.stringify(users));

            // Auto login after register
            sessionStorage.setItem('qogozAdminUser', JSON.stringify(newAdmin));

            showToast("Muvaffaqiyatli ro'yxatdan o'tdingiz!");

            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1000);
        });

        // Login Logic
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            const users = JSON.parse(localStorage.getItem('qogozAdmins') || '[]');

            let user = users.find(u => u.email === email && u.password === pass);

            // Zaxira admin paroli (Esdan chiqqan holat uchun)
            if (email === 'admin@gmail.com' && pass === '123456') {
                user = { firstName: 'Asosiy', lastName: 'Admin', email: 'admin@gmail.com' };
            }

            if (user) {
                document.getElementById('login-error').style.display = 'none';
                sessionStorage.setItem('qogozAdminUser', JSON.stringify(user));
                showToast("Tizimga muvaffaqiyatli kirdingiz!");
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        });

        // If an admin user is already logged in, redirect them to admin page
        const currentUser = JSON.parse(sessionStorage.getItem('qogozAdminUser'));
        if (currentUser) {
            window.location.href = 'admin.html';
        }

    </script>
</body>

</html>
